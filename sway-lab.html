<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>kokoro sway-lab</title>
<style>
:root{--cream:#FFF8EE;--ink:#3a3026;--gold:#d4a853;--line:#e7ddcb}
*{box-sizing:border-box}body{margin:0;background:#2b2926;color:var(--ink);font-family:system-ui,'Hiragino Kaku Gothic ProN',sans-serif;display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px}
h1{font-size:15px;color:#f0e6d2;font-weight:700;margin:2px 0;letter-spacing:.04em}
.sub{font-size:11px;color:#b6a988;margin:-8px 0 2px}
.stage{background:var(--cream);border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,.35);padding:6px}
canvas{display:block;border-radius:14px}
.panel{background:#37322c;border:1px solid #4a4339;border-radius:14px;padding:14px 16px;width:360px;max-width:94vw;color:#e9dec8;font-size:12px}
.row{display:flex;align-items:center;gap:10px;margin:9px 0}
.row label{width:96px;color:#cdbf9d}.row input[type=range]{flex:1}.row .v{width:42px;text-align:right;color:var(--gold);font-variant-numeric:tabular-nums}
.btns{display:flex;gap:8px;margin-top:6px}
button{font-family:inherit;font-weight:700;font-size:12px;color:var(--ink);background:var(--gold);border:0;border-radius:10px;padding:8px 14px;cursor:pointer}
button.ghost{background:transparent;color:#e9dec8;border:1.5px solid #5a5246}
small{color:#9a8e72}
</style></head><body>
<h1>ココロ sway-lab（髪レイヤー試作）</h1>
<div class="sub">顔＝静止 / 髪レイヤー＝横スライス×sin で揺れ ・ 仮マスク（本番はcodex髪マット）</div>
<div class="stage"><canvas id="c" width="360" height="360"></canvas></div>
<div class="panel">
<div class="row"><label>揺れ幅 amp</label><input id="amp" type="range" min="0" max="28" step="1" value="11"><span class="v" id="ampv"></span></div>
<div class="row"><label>波の数 k</label><input id="k" type="range" min="0" max="6" step="0.1" value="2.6"><span class="v" id="kv"></span></div>
<div class="row"><label>速さ Hz</label><input id="hz" type="range" min="0.1" max="1.6" step="0.05" value="0.55"><span class="v" id="hzv"></span></div>
<div class="row"><label>毛先寄り exp</label><input id="exp" type="range" min="0.6" max="3" step="0.1" value="1.3"><span class="v" id="expv"></span></div>
<div class="row"><label>根元位置 top</label><input id="top" type="range" min="0" max="0.5" step="0.02" value="0.22"><span class="v" id="topv"></span></div>
<div class="btns">
<button id="play">❚❚ 一時停止</button>
<button class="ghost" id="mask">髪マスク表示</button>
<button class="ghost" id="reset">リセット</button>
</div>
<small>※トレーリング縁の二重は仮マスク＆ベース未インペイントのため。本番は髪マット＋裏インペイントで消える。顔が1pxも動かないのが要点。</small>
</div>

let P={amp:11,k:2.6,hz:0.55,exp:1.3,top:0.22},playing=true,showMask=false,t0=performance.now();
const ids=['amp','k','hz','exp','top'];
function sync(){ids.forEach(id=>{P[id]=parseFloat(document.getElementById(id).value);document.getElementById(id+'v').textContent=document.getElementById(id).value;});}
ids.forEach(id=>document.getElementById(id).addEventListener('input',sync));sync();
document.getElementById('play').onclick=e=>{playing=!playing;e.target.textContent=playing?'❚❚ 一時停止':'▶ 再生';if(playing){t0=performance.now()-acc;loop();}};
document.getElementById('mask').onclick=()=>showMask=!showMask;
document.getElementById('reset').onclick=()=>{const d={amp:11,k:2.6,hz:0.55,exp:1.3,top:0.22};ids.forEach(id=>{document.getElementById(id).value=d[id];});sync();};
let acc=0;
function frame(now){
  acc=now-t0; const t=acc/1000;
  ctx.clearRect(0,0,W,H); ctx.fillStyle='#FFF8EE'; ctx.fillRect(0,0,W,H);
  ctx.drawImage(base,0,0,W,H);                       // 静止ベース（顔・体・髪）
  const ph=2*Math.PI*P.hz*t, denom=Math.max(1e-3,1-P.top);
  for(let y=0;y<H;y+=2){
    const yn=y/(H-1);
    const w=Math.pow(Math.min(1,Math.max(0,(yn-P.top)/denom)),P.exp);
    const dx=P.amp*w*Math.sin(ph+P.k*yn);
    ctx.drawImage(hair,0,y,W,2, dx,y,W,2);           // 髪レイヤーを行ごとに横シフト
  }
  if(showMask){ctx.globalAlpha=0.5;ctx.fillStyle='#ff00ff';ctx.globalCompositeOperation='source-atop';/*noop*/;ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;}
  if(playing) requestAnimationFrame(frame);
}
function loop(){requestAnimationFrame(frame);}
let ready=0;[base,hair].forEach(im=>im.onload=()=>{if(++ready==2)loop();});
</script></body></html>
