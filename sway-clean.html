let P={amp:14,k:2.6,hz:0.5,exp:1.35,top:0.20},playing=true,t0=performance.now(),acc=0;
const hc=document.createElement('canvas');hc.width=W;hc.height=H;const hx=hc.getContext('2d');
['amp','k','hz','exp'].forEach(id=>{const e=document.getElementById(id);const f=()=>{P[id]=parseFloat(e.value);document.getElementById(id+'v').textContent=e.value;};e.addEventListener('input',f);f();});

function frame(now){acc=now-t0;const t=acc/1000;ctx.clearRect(0,0,W,H);ctx.fillStyle='#FFF8EE';ctx.fillRect(0,0,W,H);ctx.drawImage(base,0,0,W,H);const ph=2*Math.PI*P.hz*t,dn=Math.max(1e-3,1-P.top);for(let y=0;y<H;y+=2){const yn=y/(H-1);const w=Math.pow(Math.min(1,Math.max(0,(yn-P.top)/dn)),P.exp);const dx=P.amp*w*Math.sin(ph+P.k*yn);ctx.drawImage(hair,0,y,W,2,dx,y,W,2);}if(playing)req();}
