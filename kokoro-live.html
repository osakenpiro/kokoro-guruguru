var c=document.getElementById('c'),x=c.getContext('2d'),W=600,H=600;
var imgs={},loaded=0,keys=Object.keys(SRC);
keys.forEach(function(k){var im=new Image();im.onload=function(){if(++loaded==keys.length)start();};im.src="data:image/png;base64,"+SRC[k];imgs[k]=im;});
// layer stack back->front: {key, depth(parallax), swing(hair physics), type}
var L=[
 {k:'behind',d:-1.0,sw:1.00,t:'hair'},
 {k:'back',  d:-0.45,sw:0.80,t:'hair'},
 {k:'base',  d:0.0, sw:0,   t:'base'},
 {k:'eyes',  d:0.06,sw:0,   t:'eyes'},
 {k:'mouth', d:0.06,sw:0,   t:'mouth'},
 {k:'bangs', d:0.42,sw:0.50,t:'hair'}
];
var lookTX=0,lookTY=0,lookX=0,lookY=0,lastMove=-9999;
var hairLean=0,hairVel=0;
var blinkPhase=1,nextBlink=1.2,blinkTimer=0,blinking=false,bt=0;
var micOn=false,analyser=null,buf=null,mouthLv=0;
c.addEventListener('pointermove',function(e){var r=c.getBoundingClientRect();lookTX=Math.max(-1,Math.min(1,(e.clientX-(r.left+r.width/2))/(r.width/2)));lookTY=Math.max(-1,Math.min(1,(e.clientY-(r.top+r.height*0.42))/(r.height/2)));lastMove=performance.now();});
function micLevel(){if(!analyser)return 0;analyser.getFloatTimeDomainData(buf);var s=0,i;for(i=0;i<buf.length;i++)s+=buf[i]*buf[i];return Math.min(1,Math.sqrt(s/buf.length)*4.5);}
document.getElementById('mic').onclick=async function(e){
 if(micOn){micOn=false;e.target.textContent="マイクで口パク";return;}
 try{var ms=await navigator.mediaDevices.getUserMedia({audio:true});var ac=new(window.AudioContext||window.webkitAudioContext)();await ac.resume();var sr=ac.createMediaStreamSource(ms);analyser=ac.createAnalyser();analyser.fftSize=1024;buf=new Float32Array(analyser.fftSize);sr.connect(analyser);micOn=true;e.target.textContent="マイク停止";}catch(err){document.getElementById('st').textContent="マイク不可: "+err.message;}
}
var last=performance.now();
function tick(now){
 var dt=Math.min(0.05,(now-last)/1000);last=now;
 // idle: マウス止まったらゆっくり自走（生きてる感）
 if(now-lastMove>1800){var p=now/1000;lookTX=0.42*Math.sin(p*0.55)+0.12*Math.sin(p*1.7);lookTY=0.22*Math.sin(p*0.7);}
 lookX+=(lookTX-lookX)*0.09;lookY+=(lookTY-lookY)*0.09;
 // 髪の振り子物理：頭の向きを追って遅れて揺れ、行き過ぎて戻る
 var target=lookX;hairVel+=(target-hairLean)*0.045;hairVel*=0.86;hairLean+=hairVel;
 // まばたき
 blinkTimer+=dt;
 if(!blinking&&blinkTimer>nextBlink){blinking=true;bt=0;}
 if(blinking){bt+=dt;var hb=0.14;if(bt<hb/2)blinkPhase=1-(bt/(hb/2));else if(bt<hb)blinkPhase=(bt-hb/2)/(hb/2);else{blinking=false;blinkPhase=1;blinkTimer=0;nextBlink=1.4+Math.random()*4.0;if(Math.random()<0.18)nextBlink=0.18;}}
 // 呼吸
 var breath=1+0.007*Math.sin(now/1700);
 // 口
 mouthLv+=(((micOn?micLevel():0))-mouthLv)*0.4;
 draw(breath);
 requestAnimationFrame(tick);
}
function draw(breath){
 x.clearRect(0,0,W,H);x.fillStyle='#FFF8EE';x.fillRect(0,0,W,H);
 var sk=lookX*0.05;
 for(var i=0;i<L.length;i++){
  var ly=L[i];x.save();
  x.translate(W/2,H*0.5);
  x.scale(1,breath);
  x.transform(1,0,sk,1,0,0);                 // 顔の向きスキュー
  var tx=lookX*7 + ly.d*lookX*24 + (ly.t=='hair'?hairLean*ly.sw*34:0);
  var ty=lookY*9 + ly.d*lookY*12;
  x.translate(tx,ty);
  if(ly.t=='eyes'){var ey=(0.32-0.5)*H;x.translate(0,ey);x.scale(1,blinkPhase);x.translate(0,-ey);}
  if(ly.t=='mouth'&&mouthLv>0.02){var my=(0.42-0.5)*H;x.translate(0,my);x.scale(1,1+mouthLv*1.1);x.translate(0,-my);}
  x.drawImage(imgs[ly.k],-W/2,-H/2,W,H);
  x.restore();
 }
}
function start(){requestAnimationFrame(tick);}
